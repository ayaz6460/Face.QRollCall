<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scan Attendance</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-variant": "#e0e3e5",
              "on-tertiary-container": "#fffbff",
              "on-secondary-container": "#003c70",
              "secondary-fixed-dim": "#a4c9ff",
              "on-primary": "#ffffff",
              "on-tertiary-fixed-variant": "#723600",
              "surface-container-low": "#f2f4f6",
              "on-primary-fixed-variant": "#004395",
              "on-background": "#191c1e",
              "on-primary-fixed": "#001a42",
              "tertiary-fixed": "#ffdcc6",
              "surface-tint": "#005ac2",
              "primary-fixed-dim": "#adc6ff",
              "inverse-on-surface": "#eff1f3",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#d4e3ff",
              "tertiary-fixed-dim": "#ffb786",
              "surface-dim": "#d8dadc",
              "outline-variant": "#c2c6d6",
              "inverse-primary": "#adc6ff",
              "error-container": "#ffdad6",
              "tertiary-container": "#b75b00",
              "surface-container-highest": "#e0e3e5",
              "on-tertiary-fixed": "#311400",
              "tertiary": "#924700",
              "on-error-container": "#93000a",
              "on-primary-container": "#fefcff",
              "on-error": "#ffffff",
              "on-secondary": "#ffffff",
              "on-secondary-fixed": "#001c39",
              "secondary": "#0060ac",
              "error": "#ba1a1a",
              "on-secondary-fixed-variant": "#004883",
              "surface-container-lowest": "#ffffff",
              "surface-bright": "#f7f9fb",
              "on-surface-variant": "#424754",
              "surface-container": "#eceef0",
              "primary-fixed": "#d8e2ff",
              "outline": "#727785",
              "surface": "#f7f9fb",
              "primary": "#0058be",
              "inverse-surface": "#2d3133",
              "surface-container-high": "#e6e8ea",
              "on-surface": "#191c1e",
              "secondary-container": "#64a8fe",
              "primary-container": "#2170e4",
              "background": "#f7f9fb"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .scan-line {
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
        .scanner-glow {
            box-shadow: 0 0 20px rgba(0, 88, 190, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 rounded-b-2xl bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_12px_40px_rgba(0,88,190,0.06)] flex items-center justify-between px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg text-slate-900 dark:text-slate-50">Scan Attendance</h1>
</div>
<button class="flex items-center justify-center w-10 h-10 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 rounded-full transition-all active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">flashlight_on</span>
</button>
</header>
<!-- Main Viewport Area -->
<main class="relative flex-grow flex flex-col pt-16 h-screen overflow-hidden">
<!-- Camera Preview Simulation -->
<div class="absolute inset-0 z-0">
<img alt="A blurred classroom setting with wooden desks and students in the distance, soft professional lighting" class="w-full h-full object-cover grayscale-[20%] brightness-75" data-alt="A blurred modern university lecture hall with rows of wooden desks and digital screens in a clean tech-forward atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdMDHPxevTmZJPKvFIgAGg4etLkqJNm8gNcJMEoa_yoneZF9_sFJwhvChfERQCcQUfpJAbhuHLE0KMhAxwiX35LXE1ujGaTQSbRywNjHwpg6365nq2nuV4ZEiI59vsA1FrrpFGmd8rkiO_FC2uLZhqSuv85hrfseEVddCthYndxY_smqgYZOHObRk0haazFjTst8hgSfW_mxO2-KMd4zB-LOn2d4doELdK47bAcJxXka25ancOb-ZrzkqfQn_8rL_Wo8lfnIBKlZw"/>
</div>
<!-- Overlay Layers -->
<div class="absolute inset-0 z-10 flex flex-col">
<!-- Top Dark Overlay -->
<div class="flex-grow bg-black/60 backdrop-blur-[2px]"></div>
<!-- Middle Scanner Row -->
<div class="flex flex-none h-72 md:h-96">
<!-- Left Overlay -->
<div class="flex-grow bg-black/60 backdrop-blur-[2px]"></div>
<!-- Scanning Frame -->
<div class="relative w-72 md:w-96 border-2 border-primary-container/30 rounded-xl overflow-hidden scanner-glow">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg z-30"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg z-30"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg z-30"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg z-30"></div>
<!-- Scanning Line -->
<div class="scan-line absolute left-0 right-0 h-1 bg-gradient-to-r from-transparent via-primary to-transparent z-20 shadow-[0_0_15px_rgba(0,88,190,0.8)]"></div>
<!-- Clear Viewport -->
<div class="w-full h-full bg-transparent"></div>
</div>
<!-- Right Overlay -->
<div class="flex-grow bg-black/60 backdrop-blur-[2px]"></div>
</div>
<!-- Bottom Dark Overlay -->
<div class="flex-grow bg-black/60 backdrop-blur-[2px] flex flex-col items-center pt-8 px-8">
<!-- Instruction Text -->
<p class="text-white text-center text-sm md:text-base font-medium max-w-xs leading-relaxed opacity-90 drop-shadow-md">
                    Position the QR code within the frame to mark your attendance
                </p>
<!-- Status Feedback (Subtle) -->
<div class="mt-8 px-4 py-2 bg-white/10 backdrop-blur-md rounded-full border border-white/20 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-white text-xs font-label tracking-wide uppercase">Searching for code...</span>
</div>
</div>
</div>
</main>
<!-- Bottom Action Section -->
<section class="fixed bottom-0 left-0 w-full p-8 z-40 bg-gradient-to-t from-black/80 to-transparent">
<div class="max-w-md mx-auto flex flex-col gap-4">
<button class="w-full h-14 rounded-lg bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold text-base flex items-center justify-center gap-2 shadow-xl active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-white">keyboard</span>
                Enter Code Manually
            </button>
<!-- Accessibility Help Link -->
<button class="text-white/70 text-xs font-label text-center hover:text-white transition-colors py-2">
                Having trouble scanning? Tap here for help.
            </button>
</div>
</section>
</body></html>
