    body {

<body class="bg-background text-on-background font-body antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex items-center justify-between px-6 h-16 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-xl z-50">
<button class="text-blue-700 dark:text-blue-400 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-manrope font-extrabold tracking-tight text-blue-700 dark:text-blue-400 text-lg">QRollCall</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-20 pb-32">
<!-- Asymmetric Background Accent (Visual Flourish) -->
<div class="absolute top-1/4 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="absolute bottom-1/4 -left-20 w-48 h-48 bg-tertiary/5 rounded-full blur-3xl -z-10"></div>
<!-- Failure Status Section -->
<div class="w-full max-w-sm flex flex-col items-center">
<!-- Warning Icon Circle -->
<div class="relative mb-8">
<div class="w-32 h-32 rounded-full bg-tertiary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-6xl" data-icon="schedule">schedule</span>
</div>
<!-- Glassmorphism Ring -->
<div class="absolute inset-0 border-4 border-white/20 rounded-full scale-110 blur-[1px]"></div>
</div>
<!-- Failure Messages -->
<div class="text-center space-y-3 mb-10">
<h2 class="font-headline font-bold text-3xl tracking-tight text-on-background">Expired QR Code</h2>
<p class="text-on-surface-variant leading-relaxed px-4">
                    This QR code is no longer valid for attendance marking.
                </p>
</div>
<!-- Bento-style Detail Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-6 shadow-[0_-12px_40px_rgba(0,88,190,0.03)] border border-outline-variant/15 space-y-4">
<div class="flex items-center justify-between">
<span class="text-sm font-label text-on-surface-variant">Subject</span>
<span class="text-sm font-semibold font-body text-on-surface">Advanced Mathematics</span>
</div>
<div class="h-px bg-surface-container-low w-full"></div>
<div class="flex items-center justify-between">
<span class="text-sm font-label text-on-surface-variant">Valid until</span>
<div class="flex items-center gap-1.5 text-tertiary">
<span class="material-symbols-outlined text-[18px]" data-icon="timer">timer</span>
<span class="text-sm font-semibold font-body">12:50 PM</span>
</div>
</div>
</div>
<!-- Action Button -->
<div class="w-full mt-10">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold rounded-xl active:scale-95 transition-all duration-200 shadow-lg shadow-primary/20">
                    Go Back
                </button>
</div>
<!-- Help Text -->
<p class="mt-6 text-xs text-on-surface-variant font-medium text-center opacity-70">
                Please contact your instructor if you believe this is an error.
            </p>
</div>
</main>
<!-- BottomNavBar (Suppressed for focused failure screen per Shell Visibility Rule) -->
<!-- Not rendering Navigation Shell for task-focused / transactional failure state -->
<!-- Placeholder for visual depth if needed -->
